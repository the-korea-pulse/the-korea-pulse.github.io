baseURL = "https://the-korea-pulse.github.io/"
title = "The Korea Pulse"
defaultContentLanguage = "en"
languageCode = "en-US"
enableRobotsTXT = true
timeZone = "Asia/Seoul"

# 홈에서 검색 색인(index.json) + LLM 인덱스(llms.txt) 생성 — synapse-hugo-shared 모듈 소비
[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]

[outputFormats.llms]
  mediaType = "text/plain"
  baseName  = "llms"
  isPlainText = true

[params]
  site_key       = "the_korea_pulse"
  tier           = "B"
  description    = "English-language analysis of Korea's economy, markets, and policy — synthesized from multiple Korean sources."
  og_site_name   = "The Korea Pulse"
  og_locale      = "en_US"
  og_image       = ""
  # G-GTM: 실 컨테이너 ID 발급 전 placeholder — 빈 값이면 GTM 스니펫 미출력
  gtm_id         = ""
  # WP-49: GSC HTML 태그 인증 (Google 계정 단위 토큰 — 속성마다 다를 필요 없음)
  verify_google  = "EvHXpDorbbKE9CntN4aVXNtiENA4ilq7byW4ncIlBSw"
  # WP-55: 네이버 서치어드바이저 HTML 태그 인증 (프로퍼티별 토큰 — 사이트마다 다름)
  verify_naver   = "135e042e28743f2c4bab2dfb676944f92b661249"
  verify_bing    = ""
  adsense_pub_id = ""
  daum_verification = ""

[pagination]
  pagerSize = 20

[taxonomies]
  category = "categories"

[[menu.main]]
  name   = "Home"
  url    = "/"
  weight = 1

[[menu.main]]
  name   = "About"
  url    = "/about/"
  weight = 2

[[menu.main]]
  name   = "Contact"
  url    = "/contact/"
  weight = 3

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/thishw/synapse-hugo-shared"
